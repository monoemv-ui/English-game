<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopa de Letras Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <header>
            <div id="user-profile">
                <span id="user-name">Noah</span>
                <span id="user-score">Score: 0</span>
                <span id="user-time">⏱️ 0s</span>
            </div>
            <div class="header-buttons">
                <button id="exit-btn" style="background: #ff5722;">🚪 Exit</button>
                <button id="settings-btn">⚙️ Settings</button>
            </div>
        </header>

        <main>
            <div id="word-search-container"></div>
            <div id="word-list-container">
                <ul id="word-list"></ul>
            </div>
        </main>
    </div>

    <div id="name-modal" class="modal">
        <div class="modal-content">
            <h2>Game Settings</h2>
            <input type="text" id="player-name-input" placeholder="Tu nombre">
            
            <div class="menu-group">
                <label>Theme:</label>
                <select id="theme-select"></select>
            </div>
            
            <div class="menu-group">
                <label>Difficulty:</label>
                <select id="difficulty-select">
                    <option value="normal">Normal (10 words)</option>
                    <option value="advanced">Advanced (20 words)</option>
                </select>
            </div>
            
            <button id="save-name-btn" style="width:100%; margin-top:20px;">START GAME 🚀</button>
        </div>
    </div>

    <div id="stats-modal" class="modal">
        <div class="modal-content">
            <h2>Your Stats 📊</h2>
            <div id="stats-body" style="text-align: left; margin: 15px 0;">
                <p><strong>Player:</strong> <span id="stat-player"></span></p>
                <p><strong>Total Accumulated Score:</strong> <span id="stat-score"></span></p>
            </div>
            <button id="close-stats-btn" style="width:100%">Resume / New Game</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
