<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopa de Letras Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FFCF00">
</head>
<body>
    <div id="app-container">
        <header>
            <div id="user-profile">
                <span id="user-avatar">👤</span>
                <span id="user-name">Jugador</span>
                <span id="user-score">Puntos: 0</span>
            </div>
            <h1>🔠 Word Search!</h1>
            <div class="controls">
                <select id="theme-select"></select>
                <select id="difficulty-select">
                    <option value="normal">Normal</option>
                    <option value="advanced">Avanzado</option>
                </select>
                <button id="new-game-btn">¡Jugar! 🚀</button>
            </div>
        </header>

        <main>
            <div id="word-search-container"></div>
            <div id="word-list-container">
                <h3>Busca estas palabras:</h3>
                <ul id="word-list"></ul>
            </div>
        </main>
    </div>

    <div id="name-modal" class="modal">
        <div class="modal-content">
            <h2>¡Bienvenido!</h2>
            <p>Escribe tu nombre para empezar:</p>
            <input type="text" id="player-name-input" placeholder="Tu nombre...">
            <button id="save-name-btn">Empezar</button>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
