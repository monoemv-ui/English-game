<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#FFD93D">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WordSearch">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Word Search Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ═══════════════ WELCOME SCREEN ═══════════════ -->
<div id="screen-welcome" class="screen active">
    <div class="welcome-bg">
        <div class="bubble b1"></div>
        <div class="bubble b2"></div>
        <div class="bubble b3"></div>
    </div>
    <div class="welcome-card">
        <div class="logo-area">
            <div class="logo-icon">🔤</div>
            <h1 class="logo-title">Word<span>Search</span></h1>
            <p class="logo-sub">Pro Edition</p>
        </div>

        <div class="form-section">
            <label class="field-label">Your Name</label>
            <input type="text" id="inp-name" class="field-input" placeholder="Enter your name..." maxlength="20">
        </div>

        <div class="form-section">
            <label class="field-label">Theme</label>
            <select id="inp-theme" class="field-input field-select"></select>
        </div>

        <div class="form-section">
            <label class="field-label">Difficulty</label>
            <div class="diff-buttons">
                <button class="diff-btn active" data-diff="easy">Easy<span>10 words · 12×12</span></button>
                <button class="diff-btn" data-diff="hard">Hard<span>20 words · 16×16</span></button>
            </div>
        </div>

        <button id="btn-start" class="btn-primary">
            <span>START GAME</span> 🚀
        </button>

        <button id="btn-stats-from-welcome" class="btn-secondary">
            📊 View My Stats
        </button>
    </div>
</div>

<!-- ═══════════════ GAME SCREEN ═══════════════ -->
<div id="screen-game" class="screen">
    <header class="game-header">
        <div class="hud-pill">
            <span id="hud-name">Player</span>
        </div>
        <div class="hud-center">
            <span id="hud-theme" class="hud-theme-tag">Animals 🦁</span>
        </div>
        <div class="hud-right">
            <div class="hud-stat">
                <span class="hud-label">Score</span>
                <span id="hud-score">0</span>
            </div>
            <div class="hud-stat">
                <span class="hud-label">Time</span>
                <span id="hud-time">0s</span>
            </div>
            <button id="btn-exit" class="btn-exit">✕ Exit</button>
        </div>
    </header>

    <main class="game-main">
        <div id="word-search-container" class="grid-container"></div>
        <aside class="sidebar">
            <div class="progress-ring-wrap">
                <svg class="progress-ring" viewBox="0 0 80 80">
                    <circle class="ring-bg" cx="40" cy="40" r="34"/>
                    <circle id="ring-fill" class="ring-fill" cx="40" cy="40" r="34"/>
                </svg>
                <div class="ring-label">
                    <span id="words-found-count">0</span>
                    <small id="words-total-count">/ 10</small>
                </div>
            </div>
            <ul id="word-list"></ul>
        </aside>
    </main>
</div>

<!-- ═══════════════ WIN SCREEN ═══════════════ -->
<div id="screen-win" class="screen">
    <div class="win-card">
        <div class="win-emoji" id="win-emoji">🎉</div>
        <h2 class="win-title">Puzzle Complete!</h2>
        <div class="win-stats">
            <div class="win-stat"><span class="ws-val" id="win-score">0</span><span class="ws-lbl">Score</span></div>
            <div class="win-stat"><span class="ws-val" id="win-time">0s</span><span class="ws-lbl">Time</span></div>
            <div class="win-stat"><span class="ws-val" id="win-games">0</span><span class="ws-lbl">Puzzles Done</span></div>
        </div>
        <button id="btn-play-again" class="btn-primary">Play Again 🔄</button>
        <button id="btn-win-stats" class="btn-secondary">View Stats 📊</button>
    </div>
</div>

<!-- ═══════════════ STATS SCREEN ═══════════════ -->
<div id="screen-stats" class="screen">
    <div class="stats-card">
        <button id="btn-stats-back" class="btn-back">← Back</button>
        <div class="stats-header">
            <div class="stats-avatar">🏆</div>
            <h2 id="stats-name">Player</h2>
            <p class="stats-subtitle">Personal Records</p>
        </div>
        <div class="stats-grid">
            <div class="stat-box">
                <span class="stat-icon">⭐</span>
                <span class="stat-val" id="st-score">0</span>
                <span class="stat-lbl">Total Score</span>
            </div>
            <div class="stat-box">
                <span class="stat-icon">🧩</span>
                <span class="stat-val" id="st-games">0</span>
                <span class="stat-lbl">Puzzles Done</span>
            </div>
            <div class="stat-box">
                <span class="stat-icon">⚡</span>
                <span class="stat-val" id="st-best">—</span>
                <span class="stat-lbl">Best Time</span>
            </div>
            <div class="stat-box">
                <span class="stat-icon">📈</span>
                <span class="stat-val" id="st-avg">—</span>
                <span class="stat-lbl">Avg Time</span>
            </div>
        </div>
        <div class="recent-section">
            <h3>Recent Games</h3>
            <ul id="recent-list" class="recent-list"></ul>
        </div>
        <button id="btn-new-game-from-stats" class="btn-primary" style="margin-top:16px;">New Game 🚀</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
