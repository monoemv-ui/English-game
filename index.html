<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Search Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="app-container">
        <header>
            <div id="user-profile">
                <span id="user-name">Player</span>
                <span id="user-score">Score: 0</span>
            </div>
            <div class="controls">
                <select id="theme-select"></select>
                <select id="difficulty-select">
                    <option value="normal">Normal</option>
                    <option value="advanced">Advanced</option>
                </select>
                <button id="new-game-btn">New Game 🚀</button>
            </div>
        </header>

        <main>
            <div id="word-search-container"></div>
            <div id="word-list-container">
                <ul id="word-list"></ul>
            </div>
        </main>
    </div>

    <div id="name-modal" class="modal">
        <div class="modal-content">
            <h3>Welcome!</h3>
            <input type="text" id="player-name-input" placeholder="Your Name">
            <button id="save-name-btn" style="margin-top:10px; width:100%">Start Adventure</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
